name: VibeIsland

options:
  bundleIdPrefix: com.twmissingu
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  LLMQuotaKit:
    path: Packages/LLMQuotaKit

configs:
  Debug: debug
  Release: release

schemes:
  VibeIsland:
    build:
      targets:
        VibeIsland: all
        VibeWidget: all
        VibeIslandCLI: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VibeIslandTests

targets:
  VibeIsland:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/VibeIsland
    resources:
      - path: Sources/VibeIsland/Resources
    dependencies:
      - package: LLMQuotaKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.twmissingu.VibeIsland
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_FILE: Sources/VibeIsland/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LSUIElement: true
    postBuildScripts:
      - name: Set Build Number from Git
        script: |
          BUILD=$(git -C "$SRCROOT" rev-list --count HEAD 2>/dev/null || echo 1)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true

  VibeWidget:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Widget
    dependencies:
      - package: LLMQuotaKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.twmissingu.VibeIsland.Widget
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Widget/Info.plist

  LLMQuotaKit:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Packages/LLMQuotaKit/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.twmissingu.LLMQuotaKit
        SWIFT_VERSION: "6.0"

  VibeIslandCLI:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/CLI
        excludes:
          - "**/SharedModels.swift"
      - path: Sources/CLI/SharedModels.swift
    settings:
      base:
        PRODUCT_NAME: vibe-island
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        MACOSX_DEPLOYMENT_TARGET: "14.0"

  VibeIslandTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/VibeIslandTests
        excludes:
          - "dispatch_source_test.swift"
          - "hook_format_test.swift"
    dependencies:
      - target: VibeIsland
      - package: LLMQuotaKit
    settings:
      base:
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_TESTING_SEARCH_PATHS: YES
      configs:
        Debug:
          ENABLE_TESTING_SEARCH_PATHS: YES
        Release:
          ENABLE_TESTING_SEARCH_PATHS: NO
