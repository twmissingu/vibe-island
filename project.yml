name: VibeIsland

options:
  bundleIdPrefix: com.twmissingu
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  LLMQuotaKit:
    path: Packages/LLMQuotaKit

configs:
  Debug: debug
  Release: release

schemes:
  VibeIsland:
    build:
      targets:
        VibeIsland: all
        VibeWidget: all
    run:
      config: Debug
    test:
      config: Debug

targets:
  VibeIsland:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/VibeIsland
    resources:
      - path: Sources/VibeIsland/Resources
    dependencies:
      - package: LLMQuotaKit
      - target: VibeWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.twmissingu.VibeIsland
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_FILE: Sources/VibeIsland/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LSUIElement: true
    postBuildScripts:
      - name: Set Build Number from Git
        script: |
          BUILD=$(git -C "$SRCROOT" rev-list --count HEAD 2>/dev/null || echo 1)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true

  VibeWidget:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Widget
    dependencies:
      - package: LLMQuotaKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.twmissingu.VibeIsland.Widget
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Widget/Info.plist

  LLMQuotaKit:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Packages/LLMQuotaKit/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.twmissingu.LLMQuotaKit
        SWIFT_VERSION: "6.0"
