name: VibeIsland

packages:
  LLMQuotaKit:
    path: ./Packages/LLMQuotaKit

options:
  bundleIdPrefix: com.twmissingu
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

configs:
  Debug: debug
  Release: release

schemes:
  VibeIsland:
    build:
      targets:
        VibeIsland: all
        # VibeWidget: all  # disabled
        VibeIslandCLI: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VibeIslandTests
        - VibeIslandUITests

targets:
  VibeIsland:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/VibeIsland
        excludes:
          - "**/*.md"
      - path: Packages/LLMQuotaKit/Sources/LLMQuotaKit
        excludes:
          - "**/*.md"
        buildPhase: sources
    resources:
      - path: Sources/VibeIsland/Resources
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.twmissingu.VibeIsland
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_FILE: Sources/VibeIsland/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LSUIElement: true
    postBuildScripts:
      - name: Set Build Number from Git
        script: |
          BUILD=$(git rev-list --count HEAD 2>/dev/null || echo 1)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true

  # VibeWidget disabled for now - requires development signing
  # VibeWidget:
  #   type: app-extension
  #   platform: macOS
  #   deploymentTarget: "14.0"
  #   sources:
  #     - path: Widget
  #   settings:
  #     base:
  #       PRODUCT_BUNDLE_IDENTIFIER: com.twmissingu.VibeIsland.Widget
  #       SWIFT_VERSION: "6.0"
  #       CODE_SIGN_STYLE: Automatic
  #       INFOPLIST_FILE: Widget/Info.plist
  #       CODE_SIGN_ENTITLEMENTS: Widget/VibeWidget.entitlements

  VibeIslandCLI:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/CLI
      - path: Packages/LLMQuotaKit/Sources/LLMQuotaKit
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_NAME: vibe-island
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        MACOSX_DEPLOYMENT_TARGET: "14.0"

  VibeIslandTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/VibeIslandTests
        excludes:
          - "dispatch_source_test.swift"
          - "hook_format_test.swift"
    dependencies:
      - target: VibeIsland
    settings:
      base:
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_TESTING_SEARCH_PATHS: YES
      configs:
        Debug:
          ENABLE_TESTING_SEARCH_PATHS: YES
        Release:
          ENABLE_TESTING_SEARCH_PATHS: NO

  VibeIslandUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/VibeIslandUITests
    dependencies:
      - target: VibeIsland
    settings:
      base:
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_TESTING_SEARCH_PATHS: YES
      configs:
        Debug:
          ENABLE_TESTING_SEARCH_PATHS: YES
        Release:
          ENABLE_TESTING_SEARCH_PATHS: NO
